name: warehouse-logistics-v1
version: 0.1.0
description: "Warehouse Logistics Exception Handler RL environment built for OpenEnv"
tags:
  - logistics
  - robotics
  - multi-agent

# Connects the OpenEnv runtime to your primary Python class
entry_point: environment:WarehouseEnvironment

# Strictly binds the environment API to your Pydantic schemas (The Contract)
schemas:
  observation_space: models:WarehouseState
  action_space: models:LogisticsCommand

# Environment Operational Specifications
specs:
  max_steps: 100
  supports_reset: true
  render_modes:
    - human
    - rgb_array
    - json

# Available Task Scenarios configured for the RL Agent
tasks:
  easy:
    name: "Minor Shipment Delay"

    description: "A package is flagged as delayed due to a missing component. The agent must locate the component and reroute."

    config_path: "configs/easy.yaml"
  medium:
    name: "Inventory Shortage Triage"

    description: "Multiple high-priority orders require an out-of-stock item.
     The agent must verify stock, request restock, and notify customers."

    config_path: "configs/medium.yaml"
  hard:
    name: "Cascading Failure"

    description: "A robot breaks down causing a traffic jam. The agent must dispatch maintenance, assign workers to clear the aisle, and use optimal A* pathfinding to reroute other robots around the broken unit."
    
    config_path: "configs/hard.yaml"