easy:
  name: "Minor Delay"
  time_step: 0
  worker_availability: 5
  inventory_status:
    "component_A": 50
    "component_B": 100
  robots:
    - id: "R1"
      location: [2, 2]
      status: "ACTIVE"
      battery_level: 95.0
      assigned_task: null
  blocked_paths:
    - id: "BP_001"
      location: [2, 3]
      obstruction_type: "fallen_pallet"
      severity: "LOW"
  active_exceptions:
    - id: "EX_001"
      type: "DELAY"
      description: "Delayed order due to missing component constraint."
      affected_orders: ["ORD_101"]
      severity: 2
  config:
    # Completion thresholds used by tasks.py
    min_inventory: 20
    min_inventory_medium: 50
    min_battery: 20
    max_time_steps: 50
    # Reward shaping used by environment.py
    step_penalty: -0.01
    resolution_reward: 0.5
    completion_reward: 1.0
    timeout_penalty: -1.0
    # Dynamic exception hook (disabled by default)
    new_exception_chance: 0.0
    max_active_exceptions: 6

medium:
  name: "Inventory Shortage"
  time_step: 0
  worker_availability: 2
  inventory_status:
    "high_demand_item": 1  # Below necessary threshold
  robots:
    - id: "R1"
      location: [1, 5]
      status: "ACTIVE"
      battery_level: 80.0
      assigned_task: "ORD_201"
    - id: "R2"
      location: [8, 5]
      status: "ACTIVE"
      battery_level: 65.0
      assigned_task: "ORD_202"
  blocked_paths:
    # Defining narrow corridors using blocked paths on the top and bottom of the aisle
    - id: "BP_002"
      location: [4, 4]
      obstruction_type: "spilled_liquid"
      severity: "MEDIUM"
    - id: "BP_003"
      location: [4, 6]
      obstruction_type: "boxes"
      severity: "MEDIUM"
  active_exceptions:
    - id: "EX_002"
      type: "SHORTAGE"
      description: "Multiple high-priority orders require out-of-stock components."
      affected_orders: ["ORD_201", "ORD_202"]
      severity: 4
  config:
    min_inventory: 20
    min_inventory_medium: 50
    min_battery: 20
    max_time_steps: 50
    step_penalty: -0.01
    resolution_reward: 0.5
    completion_reward: 1.0
    timeout_penalty: -1.0
    new_exception_chance: 0.0
    max_active_exceptions: 6


hard:
  name: "Cascading Failure"
  time_step: 0
  worker_availability: 1
  inventory_status:
    "tools": 5
  robots:
    - id: "R1"
      location: [5, 5]
      status: "MAINTENANCE"
      battery_level: 5.0
      assigned_task: "ORD_301"
    - id: "R2"
      location: null  # Wildcard active! No coordinates.
      status: "SENSOR_FAILURE"
      battery_level: 45.0
      assigned_task: null
    - id: "R3"
      location: [6, 6]
      status: "MAINTENANCE"
      battery_level: 2.0
      assigned_task: "ORD_302"
  blocked_paths:
    - id: "BP_004"
      location: [5, 5]
      obstruction_type: "broken_robot_R1_debris"
      severity: "HIGH"
    - id: "BP_005"
      location: [5, 6]
      obstruction_type: "broken_robot_collision_debris"
      severity: "HIGH"
  active_exceptions:
    - id: "EX_003"
      type: "BREAKDOWN"
      description: "Robot R1 breakdown in main intersection causing traffic halts."
      affected_orders: ["ORD_301"]
      severity: 5
    - id: "EX_004"
      type: "BREAKDOWN"
      description: "Robot R3 breakdown cascading from primary collision."
      affected_orders: ["ORD_302"]
      severity: 5
  config:
    min_inventory: 20
    min_inventory_medium: 50
    min_battery: 20
    max_time_steps: 50
    step_penalty: -0.01
    resolution_reward: 0.5
    completion_reward: 1.0
    timeout_penalty: -1.0
    new_exception_chance: 0.0
    max_active_exceptions: 6
